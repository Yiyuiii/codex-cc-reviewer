name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    outputs:
      npm_tag: ${{ steps.channel.outputs.npm_tag }}
      tag_version: ${{ steps.version.outputs.tag_version }}
      validation_file: ${{ steps.validation.outputs.validation_file }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Print tool versions
        run: |
          node --version
          npm --version

      - name: Resolve release channel
        id: channel
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ "$tag" == *-* ]]; then
            echo "npm_tag=next" >> "$GITHUB_OUTPUT"
            echo "required_branch=origin/next" >> "$GITHUB_OUTPUT"
          else
            echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
            echo "required_branch=origin/main" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify package version matches tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          pkg_version="$(node -p "require('./package.json').version")"
          tag_version="${GITHUB_REF_NAME#v}"
          echo "tag_version=${tag_version}" >> "$GITHUB_OUTPUT"
          if [[ "$pkg_version" != "$tag_version" ]]; then
            echo "::error::package.json version $pkg_version does not match tag $GITHUB_REF_NAME"
            exit 1
          fi

      - name: Verify tag ancestry
        shell: bash
        run: |
          set -euo pipefail
          required_branch="${{ steps.channel.outputs.required_branch }}"
          branch_name="${required_branch#origin/}"
          git fetch origin "+refs/heads/${branch_name}:refs/remotes/origin/${branch_name}"
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "$required_branch"; then
            echo "::error::Tag $GITHUB_REF_NAME at $GITHUB_SHA is not reachable from $required_branch"
            exit 1
          fi

      - name: Verify stable release validation evidence
        id: validation
        shell: bash
        run: |
          set -euo pipefail
          tag_version="${{ steps.version.outputs.tag_version }}"
          validation_file=".release-validation/${tag_version}.md"
          echo "validation_file=${validation_file}" >> "$GITHUB_OUTPUT"
          if [[ "${{ steps.channel.outputs.npm_tag }}" != "latest" ]]; then
            exit 0
          fi
          if [[ ! -s "$validation_file" ]]; then
            echo "::error::Stable release requires $validation_file at the tagged commit. See AGENTS.md for the release promotion flow."
            exit 1
          fi
          sed -i 's/\r$//' "$validation_file"
          grep -Fxq "Doctor: pass" "$validation_file" || {
            echo "::error::$validation_file must contain exact marker: Doctor: pass"
            exit 1
          }
          grep -Fxq "Local-Codex-Smoke: pass" "$validation_file" || {
            echo "::error::$validation_file must contain exact marker: Local-Codex-Smoke: pass"
            exit 1
          }
          grep -Fxq "cc_review: pass" "$validation_file" || {
            echo "::error::$validation_file must contain exact marker: cc_review: pass"
            exit 1
          }
          grep -Eq '^RC: v[0-9]+\.[0-9]+\.[0-9]+-' "$validation_file" || {
            echo "::error::$validation_file must contain an RC marker such as RC: v0.2.3-rc.0"
            exit 1
          }

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: Create npm pack dry-run manifest
        run: npm pack --dry-run --json > npm-pack-dry-run.json

      - name: Validate npm pack manifest
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const [manifest] = JSON.parse(fs.readFileSync("npm-pack-dry-run.json", "utf8"));
          const files = new Set(manifest.files.map((file) => file.path.replace(/\\/g, "/")));
          const required = [
            "dist/index.js",
            "prompts/cc-reviewer.md",
            "prompts/output-json.md",
            "examples/AGENTS.md",
            "docs/tool-contract.md",
            "README.md",
            "LICENSE"
          ];
          const missing = required.filter((path) => !files.has(path));
          const unexpected = [...files].filter(
            (path) =>
              path === ".env" ||
              path.startsWith(".github/") ||
              path.startsWith(".release-validation/") ||
              path.startsWith("src/") ||
              path.startsWith("tests/") ||
              path.startsWith("docs/superpowers/")
          );
          if (missing.length || unexpected.length) {
            console.error(JSON.stringify({ missing, unexpected }, null, 2));
            process.exit(1);
          }
          NODE

      - name: Run CLI smoke tests
        shell: bash
        run: |
          set -euo pipefail
          cli_version="$(node dist/index.js --version)"
          if [[ "$cli_version" != "${{ steps.version.outputs.tag_version }}" ]]; then
            echo "::error::CLI version $cli_version does not match tag $GITHUB_REF_NAME"
            exit 1
          fi
          node dist/index.js --help

      - name: Upload package evidence
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ github.ref_name }}-package-evidence
          path: |
            npm-pack-dry-run.json
            dist/
          if-no-files-found: error
          retention-days: 30

      - run: npm publish --ignore-scripts --provenance --tag "${{ steps.channel.outputs.npm_tag }}" --access public

      - name: Verify published package
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.tag_version }}"
          npm_tag="${{ steps.channel.outputs.npm_tag }}"
          for attempt in {1..12}; do
            package_version="$(npm view "codex-cc-reviewer@${version}" version 2>/dev/null || true)"
            dist_tag_version="$(npm view "codex-cc-reviewer@${npm_tag}" version 2>/dev/null || true)"
            if [[ "$package_version" == "$version" && "$dist_tag_version" == "$version" ]]; then
              exit 0
            fi
            echo "Waiting for npm registry propagation, attempt ${attempt}/12..."
            sleep 10
          done
          echo "::error::npm did not report codex-cc-reviewer@${version} on dist-tag ${npm_tag}"
          exit 1

  github-release:
    runs-on: ubuntu-latest
    needs: publish
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Write GitHub Release notes
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          tag_version="${{ needs.publish.outputs.tag_version }}"
          npm_tag="${{ needs.publish.outputs.npm_tag }}"
          validation_file="${{ needs.publish.outputs.validation_file }}"
          {
            echo "## Validation"
            echo "- CI matrix: Node 20/22/24 is covered by the CI workflow before release"
            echo "- npm pack --dry-run: passed"
            echo "- CLI smoke: \`node dist/index.js --version\` and \`node dist/index.js --help\` passed"
            if [[ "$npm_tag" == "latest" ]]; then
              echo "- local Codex smoke: passed (see \`${validation_file}\`)"
              echo "- cc_review release diff: passed or recorded with no blockers in \`${validation_file}\`"
            else
              echo "- local Codex smoke: not required for prerelease"
              echo "- cc_review release diff: not required for prerelease"
            fi
            echo "- npm dist-tag: \`${npm_tag}\` verified"
            echo
            echo "Published npm package: \`codex-cc-reviewer@${tag_version}\`"
            echo "Git tag: \`${tag}\`"
          } > release-notes.md

      - name: Create or update GitHub Release
        uses: actions/github-script@v8
        env:
          RELEASE_NOTES_PATH: release-notes.md
          IS_PRERELEASE: ${{ needs.publish.outputs.npm_tag == 'next' }}
        with:
          script: |
            const fs = require("node:fs");
            const tagName = context.ref.replace("refs/tags/", "");
            const body = fs.readFileSync(process.env.RELEASE_NOTES_PATH, "utf8");
            const prerelease = process.env.IS_PRERELEASE === "true";
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag: tagName
              });
              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: existing.data.id,
                tag_name: tagName,
                name: tagName,
                body,
                prerelease
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
              await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tagName,
                target_commitish: context.sha,
                name: tagName,
                body,
                prerelease
              });
            }
