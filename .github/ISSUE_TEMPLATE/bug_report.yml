name: Bug report
description: Report a problem with codex-cc-reviewer
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: codex-cc-reviewer version
  - type: input
    id: codex
    attributes:
      label: Codex version
  - type: input
    id: claude
    attributes:
      label: Claude Code version
  - type: textarea
    id: doctor
    attributes:
      label: Output of `codex-cc-reviewer doctor`
      render: text

